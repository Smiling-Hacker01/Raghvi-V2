name: raghvi-v2

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-raghvi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-raghvi_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-raghvi}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raghvi} -d ${POSTGRES_DB:-raghvi}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-raghvi}:${POSTGRES_PASSWORD:-raghvi_dev_password}@postgres:5432/${POSTGRES_DB:-raghvi}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: